name: Daily Data Sync

on:
  schedule:
    # 4/8~4/13 수집기간: 8시간 간격 실행 (KST 00시=UTC 15시, KST 08시=UTC 23시(전일), KST 16시=UTC 07시)
    - cron: '0 15 7-12 4 *'   # KST 00:00 (4/8~4/13)
    - cron: '0 23 7-12 4 *'   # KST 08:00 (4/8~4/13)
    - cron: '0 7 8-13 4 *'    # KST 16:00 (4/8~4/13)
  workflow_dispatch:
    inputs:
      manual_date:
        description: '수집할 특정 날짜 (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 자신 레포지토리에 푸쉬할 권한 부여

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r "일일데이터 공공데이터포털_API 가져오기/requirements.txt"

      - name: Run Data Collection
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          SENDER_EMAIL: ${{ secrets.EMAIL_SENDER }}
          SENDER_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.EMAIL_RECEIVER }}
        run: |
          if [ -z "${{ github.event.inputs.manual_date }}" ]; then
            # 4/8~4/13 수집: 4/13 기준 6일간 수집, --force로 주말 포함
            python "일일데이터 공공데이터포털_API 가져오기/daily_fetch.py" --date "2026-04-13" --days 6 --force
          else
            echo "🚀 [Manual Run] Target Date: ${{ github.event.inputs.manual_date }}"
            python "일일데이터 공공데이터포털_API 가져오기/daily_fetch.py" --date "${{ github.event.inputs.manual_date }}" --days 1 --force
          fi

      - name: Commit and Push progress
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변동된 사항 및 체크포인트 스테이징
          git add data/ summary.txt "일일데이터 공공데이터포털_API 가져오기/api_extraction.log" "일일데이터 공공데이터포털_API 가져오기/checkpoint.json" || true
          
          # 변경사항이 있을 경우 커밋 (중단 시점 기록 포함)
          git commit -m "data: [AUTO] Sync Progress/Update $(date +'%Y-%m-%d')" || echo "No changes to commit"
          
          # 메인 브랜치로 푸시
          git push origin HEAD:main
